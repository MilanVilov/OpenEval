services:
  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${APP_MYSQL_CLIENT_DB:-${MYSQL_DATABASE:-openeval}}
      MYSQL_USER: ${APP_MYSQL_CLIENT_USER:-${MYSQL_USER:-openeval}}
      MYSQL_PASSWORD: ${APP_MYSQL_CLIENT_PASS:-${MYSQL_PASSWORD:?Set APP_MYSQL_CLIENT_PASS or MYSQL_PASSWORD in an ignored .env file or shell}}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in an ignored .env file or shell}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - openeval-mysql:/var/lib/mysql

  openeval:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_MYSQL_CLIENT_DB=${APP_MYSQL_CLIENT_DB:-${MYSQL_DATABASE:-openeval}}
      - APP_MYSQL_CLIENT_HOST=mysql
      - APP_MYSQL_CLIENT_PORT=3306
      - APP_MYSQL_CLIENT_USER=${APP_MYSQL_CLIENT_USER:-${MYSQL_USER:-openeval}}
      - APP_MYSQL_CLIENT_PASS=${APP_MYSQL_CLIENT_PASS:-${MYSQL_PASSWORD:?Set APP_MYSQL_CLIENT_PASS or MYSQL_PASSWORD in an ignored .env file or shell}}
      - APP_DB_CONNECTION_POOL=${APP_DB_CONNECTION_POOL:-5}
      - UPLOAD_DIR=./data/uploads
      - PORT=${PORT:-8000}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - openeval-data:/app/data

volumes:
  openeval-data:
  openeval-mysql:

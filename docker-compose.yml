services:
  openeval:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./data/open_eval.db
      - UPLOAD_DIR=./data/uploads
      - PORT=${PORT:-8000}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - openeval-data:/app/data

volumes:
  openeval-data:

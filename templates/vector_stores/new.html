{% extends "base.html" %}

{% block title %}New Vector Store — OpenEval{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New Vector Store</h1>
</div>

{% if error %}
<div class="card mb-3" style="border:1px solid var(--danger);background:rgba(248,81,73,0.08);">
    <p style="color:var(--danger);margin:0;font-size:13px;">
        <i data-lucide="alert-circle" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;"></i>
        {{ error }}
    </p>
</div>
{% endif %}

<div class="card">
    <form action="/vector-stores" method="POST">
        <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input class="input" type="text" id="name" name="name" required
                   placeholder="e.g. Product Documentation" style="width:100%;"
                   value="{{ name if name else '' }}">
        </div>

        <div class="form-actions">
            <a href="/vector-stores" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">
                <i data-lucide="plus" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;"></i>
                Create
            </button>
        </div>
    </form>
</div>
{% endblock %}
